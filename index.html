<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Watch the Video</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #090a10;
        color: #f8f5ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100svh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 16px;
        background:
          radial-gradient(circle at 50% 0%, rgba(255, 97, 168, 0.25), transparent 22rem),
          radial-gradient(circle at 100% 90%, rgba(92, 140, 255, 0.16), transparent 20rem),
          #090a10;
      }

      main {
        width: min(100%, 920px);
      }

      .content {
        padding: 22px 4px 0;
        text-align: center;
      }

      .video {
        position: relative;
        overflow: hidden;
        width: 100%;
        aspect-ratio: 16 / 9;
        border-radius: 18px;
        background: #05060a;
        box-shadow: 0 18px 54px rgba(0, 0, 0, 0.32);
      }

      iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      p {
        max-width: 560px;
        margin: 0 auto;
        color: #d9d4e8;
        font-size: 16px;
        line-height: 1.55;
        text-align: center;
      }

      .actions {
        display: grid;
        gap: 12px;
        margin-top: 22px;
      }

      .button {
        display: inline-flex;
        min-height: 52px;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        color: #ffffff;
        font-weight: 800;
        letter-spacing: 0.01em;
        text-decoration: none;
        transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease;
      }

      .button:hover {
        transform: translateY(-2px);
      }

      .button:active {
        transform: translateY(0);
        opacity: 0.88;
      }

      .onlyfans {
        background: linear-gradient(135deg, #00aff0, #0077ff);
        box-shadow: 0 14px 34px rgba(0, 175, 240, 0.28);
      }

      .x {
        background: #ffffff;
        color: #090a10;
        box-shadow: 0 14px 34px rgba(255, 255, 255, 0.18);
      }

      @media (max-width: 380px) {
        body {
          padding: 10px;
        }

        .video {
          border-radius: 16px;
        }

        .content {
          padding-top: 18px;
        }

        p {
          font-size: 14px;
        }

        .button {
          min-height: 50px;
        }
      }

      @media (min-width: 640px) {
        body {
          padding: 32px;
        }

        .video {
          border-radius: 24px;
        }

        .content {
          padding: 28px 16px 0;
        }

        p {
          font-size: 18px;
        }

        .actions {
          grid-template-columns: repeat(2, minmax(0, 220px));
          justify-content: center;
          margin-top: 26px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="video">
        <iframe
          src="https://player.mediadelivery.net/embed/660114/504833d8-d955-4ee2-a91e-f46326a71285?autoplay=true&loop=false&muted=true&preload=true&responsive=true"
          loading="lazy"
          title="Video player"
          allow="accelerometer; gyroscope; autoplay; encrypted-media; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>
      <div class="content">
        <p>
          If you liked this video, join my free OnlyFans page for more.
          No pressure - you can also follow me on X and decide later.
        </p>
        <div class="actions" aria-label="Social links">
          <a class="button onlyfans" href="https://onlyfans.com/missslily_sfw/c63" target="_blank" rel="noopener noreferrer" aria-label="Open free OnlyFans page">Free OnlyFans</a>
          <a class="button x" href="https://x.com/misss_lilyy" target="_blank" rel="noopener noreferrer" aria-label="Open X profile">X</a>
        </div>
      </div>
    </main>
  </body>
</html>
